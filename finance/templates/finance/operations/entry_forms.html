{% extends 'base.html' %}

{% block content %}
<div class="container-fluid p-0" style="max-width: 900px;">

    <!-- En-tête -->
    <div class="mb-4 text-center text-md-start">
        <h2 class="fw-bold text-dark mb-1">Nouvelle opération</h2>
        <p class="text-muted small">Sélectionnez le type de transaction à enregistrer.</p>
    </div>

    <!-- Grille adaptative : empilée sur mobile, 3 colonnes sur PC/Tablette (à partir de md) -->
    <div class="row g-3">

        <!-- BOUTON REVENU -->
        <div class="col-12 col-md-4">
            <a href="{% url 'revenue_create' %}" 
               class="d-flex align-items-center justify-content-between p-3 bg-white border rounded-3 shadow-sm text-decoration-none border-start border-4 border-success transition-card"
               style="height: 100%;">
                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center justify-content-center rounded-3 text-success bg-success bg-opacity-10" style="width: 42px; height: 42px;">
                        <i class="bi bi-arrow-up-circle-fill fs-4"></i>
                    </div>
                    <span class="fw-bold text-dark fs-5">Revenu</span>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </a>
        </div>

        <!-- BOUTON DEPENSE -->
        <div class="col-12 col-md-4">
            <a href="{% url 'expense_create' %}" 
               class="d-flex align-items-center justify-content-between p-3 bg-white border rounded-3 shadow-sm text-decoration-none border-start border-4 border-danger transition-card"
               style="height: 100%;">
                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center justify-content-center rounded-3 text-danger bg-danger bg-opacity-10" style="width: 42px; height: 42px;">
                        <i class="bi bi-arrow-down-circle-fill fs-4"></i>
                    </div>
                    <span class="fw-bold text-dark fs-5">Dépense</span>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </a>
        </div>

        <!-- BOUTON STOCK -->
        <div class="col-12 col-md-4">
            <a href="{% url 'stock_create' %}" 
               class="d-flex align-items-center justify-content-between p-3 bg-white border rounded-3 shadow-sm text-decoration-none border-start border-4 border-info transition-card"
               style="height: 100%;">
                <div class="d-flex align-items-center gap-3">
                    <div class="d-flex align-items-center justify-content-center rounded-3 text-info bg-info bg-opacity-10" style="width: 42px; height: 42px;">
                        <i class="bi bi-box-seam-fill fs-4"></i>
                    </div>
                    <span class="fw-bold text-dark fs-5">Stock</span>
                </div>
                <i class="bi bi-chevron-right text-muted"></i>
            </a>
        </div>

    </div>
</div>

<!-- Optionnel : Un mini effet de survol pour rendre l'interface encore plus pro -->
<style>
    .transition-card {
        transition: transform 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    .transition-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 .5rem 1rem rgba(0,0,0,.08)!important;
    }
    .transition-card:active {
        transform: scale(0.98);
    }
</style>
{% endblock %}
