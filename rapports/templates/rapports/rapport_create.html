{% extends "base.html" %}

{% block title %}
Nouveau rapport
{% endblock %}

{% block content %}

<div class="container py-4">

    <div class="card shadow-sm">

        <div class="card-header">
            <h3 class="mb-0">
                Rapport journalier
            </h3>
        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <hr>

                <h5 class="mb-3">
                    Agents participants
                </h5>

                {{ formset.management_form }}

                {% for participant_form in formset %}

                    <div class="card mb-3">

                        <div class="card-body">

                            {{ participant_form.as_p }}

                        </div>

                    </div>

                {% endfor %}

                <button type="submit"
                        class="btn btn-success">

                    Enregistrer le rapport

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
